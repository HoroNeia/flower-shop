name: Flower Shop CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    # 🌟 FIX: Opt-in to Node 24 for the runner actions to clear deprecation warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint Check (Automatic Testing)
        # This is your "Gatekeeper". If this fails, the deployment stops!
        run: npm run lint

      - name: Run Build (Type Check & Bundle)
        # This ensures TypeScript is valid before deploying
        run: npm run build

      - name: Deploy to Firebase
        # 🌟 LOGIC: This ONLY runs if all previous steps (Lint & Build) passed perfectly
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLOWER_SHOP_44943 }}"
          channelId: live
          projectId: flower-shop-44943
